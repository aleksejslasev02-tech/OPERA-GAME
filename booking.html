<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberVerse | Бронь</title>
    <style>
        :root{--bg:#0a0a12;--card:#141423;--accent:#00ff66;--text:#fff;--muted:#8b8b9e;--danger:#ff3333}
        *{box-sizing:border-box;margin:0;padding:0;font-family:sans-serif}
        body{background:var(--bg);color:var(--text);padding:20px;text-align:center}
        h1{color:var(--accent);text-transform:uppercase;margin-bottom:20px}
        .tabs{display:flex;justify-content:center;gap:10px;margin-bottom:30px}
        .tab-link{background:var(--card);color:var(--text);padding:12px 24px;border-radius:5px;text-decoration:none;font-weight:bold}
        .tab-link.active{background:var(--accent);color:#000}
        .tab-content{max-width:700px;margin:0 auto;background:var(--card);padding:25px;border-radius:8px}
        .club-map{background:#0e0e1a;border:2px solid #2a2a40;padding:30px;border-radius:12px;display:flex;gap:20px;margin:20px 0;justify-content:center;align-items:stretch}
        .main-hall{display:flex;flex-direction:column;gap:35px}
        .map-row,.center-row{display:flex;gap:12px}
        .center-block{display:flex;flex-direction:column;gap:10px}
        .right-vertical-zone{display:flex;flex-direction:column;justify-content:space-between;width:60px}
        .vertical-pcs{display:flex;flex-direction:column;gap:15px}
        .entrance-label{border:2px dashed var(--danger);color:var(--danger);padding:5px;font-weight:bold;font-size:12px;border-radius:4px;margin-top:auto}
        
        .pc-box{background:#1a1a2e;width:50px;height:50px;display:flex;flex-direction:column;justify-content:center;align-items:center;border-radius:6px;cursor:pointer;border:1px solid #3a3a56;font-weight:bold;font-size:14px;transition:all .2s}
        .pc-box.selected{background:var(--accent);color:#000;box-shadow:0 0 10px var(--accent)}
        .pc-box.locked{background:rgba(255,51,51,0.15);color:var(--danger);border-color:var(--danger);cursor:not-allowed;box-shadow:0 0 8px rgba(255,51,51,0.3)}
        .pc-timer{font-size:9px;color:#ff8888;font-weight:normal;margin-top:2px}
        
        .booking-panel{margin-top:20px;border-top:1px solid #2a2a40;padding-top:20px}
        .price-calculation{font-size:20px;color:var(--accent);margin:15px 0;font-weight:bold}
        .checkout-btn{background:var(--accent);color:#000;border:none;padding:12px 30px;font-weight:bold;border-radius:5px;cursor:pointer;display:none;margin:0 auto}

        .modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.8);justify-content:center;align-items:center;z-index:99}
        .modal-content{background:var(--card);padding:25px;border-radius:8px;width:90%;max-width:380px;position:relative;text-align:left}
        .close-modal{position:absolute;top:10px;right:15px;background:none;border:none;color:var(--muted);font-size:22px;cursor:pointer}
        .form-group{margin-top:15px}
        .form-group label{display:block;margin-bottom:5px;color:var(--muted);font-size:14px}
        .form-group input,.form-group select{width:100%;padding:10px;background:#2a2a40;border:1px solid #3a3a56;color:#fff;border-radius:5px}
        .submit-pay-btn{width:100%;background:var(--accent);color:#000;border:none;padding:12px;font-weight:bold;border-radius:5px;margin-top:20px;cursor:pointer}

        .support-btn-container{position:fixed;bottom:25px;right:25px;z-index:9999}
        .support-btn{background:transparent;color:var(--accent);border:2px solid var(--accent);padding:14px 24px;border-radius:50px;font-size:15px;font-weight:bold;cursor:pointer;display:flex;align-items:center;gap:10px;box-shadow:0 0 15px rgba(0,255,102,.2);transition:all .3s ease}
        .support-btn:hover{background:var(--accent);color:#000;box-shadow:0 0 25px var(--accent);transform:translateY(-3px)}
    </style>
</head>
<body>
    <header><h1>Opera games</h1></header>
    <nav class="tabs">
        <a href="index.html" class="tab-link">Пакеты часов</a>
        <a href="booking.html" class="tab-link active">Забронировать ПК</a>
        <a href="games.html" class="tab-link">Наши игры</a>
    </nav>
    <div class="tab-content">
        <h2>Схема зала и резерв мест</h2>
        <div class="club-map">
            <div class="main-hall">
                <div class="map-row" id="topRow"></div>
                <div class="center-block">
                    <div class="center-row" id="centerTop"></div>
                    <div class="center-row" id="centerBottom"></div>
                </div>
                <div class="map-row" id="bottomRow"></div>
            </div>
            <div class="right-vertical-zone">
                <div class="vertical-pcs" id="rightRow"></div>
                <div class="entrance-label">🚪 Вход</div>
            </div>
        </div>
        <div class="booking-panel">
            <div id="statusText">Компьютеры не выбраны</div>
            <div class="price-calculation" id="priceText">Итого к оплате: 0 ₸</div>
            <button class="checkout-btn" id="checkoutBtn" onclick="openModal()">Забронировать и оплатить</button>
        </div>
    </div>
    <div id="payModal" class="modal">
        <div class="modal-content">
            <button class="close-modal" onclick="closeModal()">&times;</button>
            <h3 style="color:var(--accent)">Регистрация брони</h3>
            <p id="modalSummary" style="margin-top:10px;color:var(--muted)"></p>
            <p id="modalPrice" style="margin-top:5px;font-weight:bold"></p>
            <form onsubmit="pay(event)">
                <div class="form-group"><label>Способ оплаты</label><select id="method"><option value="kaspi">Kaspi.kz</option><option value="card">Карта Visa/Mastercard</option></select></div>
                <div class="form-group"><label>Номер телефона</label><input type="tel" id="phone" placeholder="+7 (707) 000-00-00" required></div>
                <button type="submit" class="submit-pay-btn">Оплатить бронь</button>
            </form>
        </div>
    </div>
    <div class="support-btn-container">
        <button class="support-btn" onclick="openSupportWebsite()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 18v-6a9 9 0 0 1 18 0v6"></path><path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3zM3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z"></path></svg>
            Техподдержка ИИ
        </button>
    </div>
    <script>
        let sel = []; 
        const prc = 500; 
        const pEls = {};
        
        const sTxt = document.getElementById('statusText');
        const pTxt = document.getElementById('priceText');
        const btn = document.getElementById('checkoutBtn');

        function createPC(id) 
        {
            const p = document.createElement('div'); 
            p.className = 'pc-box'; 
            p.innerHTML = `<span>${id}</span>`; 
            pEls[id] = p;
            
            p.onclick = () => 
            {
                if (p.classList.contains('locked')) return;
                if (p.classList.toggle('selected')) 
                { 
                    sel.push(id); 
                } else 
                { 
                    sel = sel.filter(i => i !== id); 
                }
                sel.sort((a,b) => a-b);
                if (sel.length) 
                {
                    sTxt.innerText = `Выбранные ПК: ${sel.join(', ')}`; 
                    pTxt.innerText = `Итого к оплате: ${sel.length * prc} ₸`; 
                    btn.style.display = 'block';
                } 
                else 
                { 
                    sTxt.innerText = 'Компьютеры не выбраны'; 
                    pTxt.innerText = 'Итого к оплате: 0 ₸'; 
                    btn.style.display = 'none'; 
                }
            }; 
            return p;
        }

        
        for (let i=1; i<=7; i++) document.getElementById('topRow').appendChild(createPC(i));
        for (let i=8; i<=13; i++) document.getElementById('centerTop').appendChild(createPC(i));
        for (let i=14; i<=19; i++) document.getElementById('centerBottom').appendChild(createPC(i));
        for (let i=20; i<=26; i++) document.getElementById('bottomRow').appendChild(createPC(i));
        for (let i=27; i<=30; i++) document.getElementById('rightRow').appendChild(createPC(i));

        function openModal()
        {
            document.getElementById('modalSummary').innerText = `Резерв для ПК: ${sel.join(', ')}`;
            document.getElementById('modalPrice').innerText = `Сумма: ${sel.length * prc} ₸`;
            document.getElementById('payModal').style.display = 'flex';
        }
        
        function closeModal() 
        { 
            document.getElementById('payModal').style.display = 'none'; 
        }

        // Функция запуска таймера с расчетом оставшихся секунд
        function startLockTimer(id, endTime) 
        {
            const p = pEls[id]; 
            if (!p) return;
            p.classList.remove('selected'); 
            p.classList.add('locked');
            
            let d = p.querySelector('.pc-timer');
            if (!d) 
            { 
                d = document.createElement('div'); 
                d.className = 'pc-timer'; 
                p.appendChild(d); 
            }
            
            const iv = setInterval(() => 
            {
                let t = Math.floor((endTime - Date.now()) / 1000);
                
                if (t < 0) 
                { 
                    clearInterval(iv); 
                    p.classList.remove('locked'); 
                    d.remove(); 
                    localStorage.removeItem(`pc_lock_${id}`);
                    return;
                }
                
                let m = Math.floor(t / 60), s = t % 60; 
                s = s < 10 ? '0' + s : s; 
                d.innerText = `${m}:${s}`; 
            }, 1000);
        }

        // Вызывается при оплате
        function lockPC(id) 
        {
            const duration = 600 * 100;
            const endTime = Date.now() + duration;
            localStorage.setItem(`pc_lock_${id}`, endTime);
            startLockTimer(id, endTime);
        }


        function checkSavedLocks() 
        {
            for (let i = 1; i <= 30; i++) 
            {
                const savedTime = localStorage.getItem(`pc_lock_${i}`);
                if (savedTime) {
                    if (Number(savedTime) > Date.now()) 
                    {
                        startLockTimer(i, Number(savedTime));
                    } else 
                    {
                        localStorage.removeItem(`pc_lock_${i}`);
                    }
                }
            }
        }
        
        checkSavedLocks();

        function pay(e) 
        {
            e.preventDefault(); 
            alert(`Счет отправлен на номер ${document.getElementById('phone').value}. Компьютеры заблокированы на 10 минут.`);
            sel.forEach(id => lockPC(id)); 
            sel = []; 
            sTxt.innerText = 'Компьютеры не выбраны'; 
            pTxt.innerText = 'Итого к оплате: 0 ₸'; 
            btn.style.display = 'none'; 
            closeModal();
        }
        
        function openSupportWebsite() 
        { 
            window.open('https://cyberverse.kz', '_blank'); 
        }
         function resetAllData() {
            if(confirm("Вы уверены, что хотите сбросить все таймеры и обнулить купленное время?")) {
                localStorage.clear();
                location.reload();
            }
        }

        function goToSupportPage() 
        { 
            window.open('https://cyberverse.kz', '_blank'); 
        }

        updateDashboardUI();
        startSessionTimer();

        window.onclick = function(e) 
        { 
            if (e.target == modal) closePaymentModal();
        }
    </script>
</body>
</html>
